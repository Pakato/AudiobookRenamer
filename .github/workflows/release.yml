name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore AudioBookManager/AudioBookManager.csproj

      - name: Publish
        run: >
          dotnet publish AudioBookManager/AudioBookManager.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:Version=${{ steps.ver.outputs.version }}
          /p:PublishSingleFile=false
          /p:PublishReadyToRun=false
          -o publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: cmd
        run: >
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.ver.outputs.version }}
          /DSourceDir=%CD%\publish
          installer\installer.iss

      - name: Generate update.xml
        shell: bash
        run: |
          mkdir -p dist
          sed "s/__VERSION__/${{ steps.ver.outputs.version }}/g" installer/update.xml.template > dist/update.xml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/AudiobookRenamerSetup-${{ steps.ver.outputs.version }}.exe
            dist/update.xml
